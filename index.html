<script>
    
let myPosition = null;

navigator.geolocation.getCurrentPosition(function(position){

    myPosition = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
    };

    // 내 위치로 지도 이동
    map.setCenter(
        new naver.maps.LatLng(
            myPosition.lat,
            myPosition.lng
        )
    );

    // 내 위치 마커 생성
    new naver.maps.Marker({

        position: new naver.maps.LatLng(
            myPosition.lat,
            myPosition.lng
        ),

        map: map,

        icon: {
            content: `
                <div style="
                    width:18px;
                    height:18px;
                    background:#0066ff;
                    border-radius:50%;
                    border:3px solid white;
                    box-shadow:0 0 10px rgba(0,0,0,0.4);
                "></div>
            `
        }

    });

});
let allMarkers = [];
let pointData = [];
let openedInfoWindow = null;

const map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(36.6, 126.8),
    zoom: 8
});
naver.maps.Event.addListener(map, 'click', function(e){

    if(openedInfoWindow){
        openedInfoWindow.close();
        openedInfoWindow = null;
    }

});


fetch("./points.json")
.then(res => res.json())
.then(data => {

    pointData = data;

    drawMarkers(pointData);

});

function getDistance(lat1, lng1, lat2, lng2){

    const R = 6371;

    const dLat =
        (lat2-lat1) * Math.PI/180;

    const dLng =
        (lng2-lng1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *

        Math.sin(dLng/2) *
        Math.sin(dLng/2);

    const c =
        2 * Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R * c;
}
function filterDistance(km){

    const filtered =
        pointData.filter(point=>{

            const distance =
                getDistance(

                    myPosition.lat,
                    myPosition.lng,

                    point.lat,
                    point.lng
                );

            return distance <= km;

        });

    drawMarkers(filtered);

}
function drawMarkers(points){

    allMarkers.forEach(m=>m.setMap(null));
    allMarkers = [];

    points.forEach(point=>{

        const marker = new naver.maps.Marker({

    position: new naver.maps.LatLng(
        point.lat,
        point.lng
    ),

    map: map,

    icon: {

        url: './marker-red.png',

        size: new naver.maps.Size(42, 42),

        scaledSize: new naver.maps.Size(42, 42),

        anchor: new naver.maps.Point(21, 42)

    }
});
        const naviUrl =
`nmap://route/car?dlat=${point.lat}&dlng=${point.lng}&dname=${encodeURIComponent(point.name)}&appname=anyoneplus.github.io`;

const infoWindow = new naver.maps.InfoWindow({

    content: `
        <div style="
            padding:16px;
            min-width:250px;
            font-size:22px;
            line-height:2;
        ">

            <b>${point.name}</b><br>

            지역 : ${point.region}<br>
            주소 : ${point.address}<br>
            유형 : ${point.type}<br>
            채비 : ${point.rig}<br><br>

            <a href="${naviUrl}"
               style="
                    display:inline-block;
                    background:#03c75a;
                    color:white;
                    text-decoration:none;
                    padding:10px 200px;
                    border-radius:6px;
                    font-weight:bold;
               ">
               길안내
            </a>

        </div>
    `
});

naver.maps.Event.addListener(marker, 'click', function () {

    if (openedInfoWindow === infoWindow) {
        infoWindow.close();
        openedInfoWindow = null;
        return;
    }

    if (openedInfoWindow) {
        openedInfoWindow.close();
    }

    infoWindow.open(map, marker);
    openedInfoWindow = infoWindow;

});

allMarkers.push(marker);

    });

}

function filterType(type){

    const filtered = pointData.filter(
        p=>p.type===type
    );

    drawMarkers(filtered);

}


</script>
