async function loadPoints(){

    console.log("Firebase 읽기 시작");

    const snapshot =
        await window.getDocs(
            window.collection(
                window.db,
                "points"
            )
        );

    pointData = [];

    snapshot.forEach(doc=>{

        pointData.push({

            id: doc.id,

            ...doc.data()

        });

    });

    console.log("Firebase 데이터:", pointData);
    console.log("마커 개수:", pointData.length);

    drawMarkers(pointData);

}



async function ratePoint(docId){

    const point =
        pointData.find(
            p => p.id === docId
        );

    if(!point) return;

    if(point.rating === 1){

        alert("이미 조과 기록된 포인트입니다");
        return;

    }

    const ref =
        window.doc(
            window.db,
            "points",
            docId
        );

    await window.updateDoc(ref, {

        rating: 1

    });

    alert("조과 기록 완료");

    loadPoints();

}
async function deletePoint(docId){

function getDistance(lat1, lng1, lat2, lng2){

    const R = 6371;

    const dLat =
        (lat2-lat1) * Math.PI/180;

    const dLng =
        (lng2-lng1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *

        Math.sin(dLng/2) *
        Math.sin(dLng/2);

    const c =
        2 * Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R * c;
}
function filterDistance(km){

    const filtered =
        pointData.filter(point=>{

            const distance =
                getDistance(

                    myPosition.lat,
                    myPosition.lng,

                    point.lat,
                    point.lng
                );

            return distance <= km;

        });

    drawMarkers(filtered);

}

});
