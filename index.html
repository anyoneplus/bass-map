<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>bass map</title>
<style>
#controls {

    position: absolute;

    top: 100px;

    left: 80px;

    z-index: 1000;

    background: white;

    padding: 12px;

    border-radius: 12px;

    box-shadow: 0 3px 10px rgba(0,0,0,0.3);

}

#controls button {

    display: block;

    width: 150px;

    height: 100px;

    margin-bottom: 8px;

    font-size: 25px;

    font-weight: bold;

    border-radius: 8px;

    cursor: pointer;

}
</style>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=w3o500vq8f"></script>
</head>
<body>

<div id="controls">
   <button onclick="showAll()">전체</button>

<button onclick="filterDistance(10)">
    10KM
</button>

<button onclick="filterDistance(50)">
    50KM
</button>

<button onclick="filterDistance(100)">
    100KM
</button>
</div>
<div id="map" style="width:100%;height:100vh;"></div>

<script>
let myPosition = null;

navigator.geolocation.getCurrentPosition(function(position){

    myPosition = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
    };

    // 내 위치로 지도 이동
    map.setCenter(
        new naver.maps.LatLng(
            myPosition.lat,
            myPosition.lng
        )
    );

    // 내 위치 마커 생성
    new naver.maps.Marker({

        position: new naver.maps.LatLng(
            myPosition.lat,
            myPosition.lng
        ),

        map: map,

        icon: {
            content: `
                <div style="
                    width:18px;
                    height:18px;
                    background:#0066ff;
                    border-radius:50%;
                    border:3px solid white;
                    box-shadow:0 0 10px rgba(0,0,0,0.4);
                "></div>
            `
        }

    });

});

const map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(36.6,126.8),
    zoom: 8
});

let allMarkers = [];
let pointData = [];

fetch("./points.json")
.then(res => res.json())
.then(data => {

    pointData = data;

    drawMarkers(pointData);

});
function getDistance(lat1, lng1, lat2, lng2){

    const R = 6371;

    const dLat =
        (lat2-lat1) * Math.PI/180;

    const dLng =
        (lng2-lng1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *

        Math.sin(dLng/2) *
        Math.sin(dLng/2);

    const c =
        2 * Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R * c;
}
function filterDistance(km){

    const filtered =
        pointData.filter(point=>{

            const distance =
                getDistance(

                    myPosition.lat,
                    myPosition.lng,

                    point.lat,
                    point.lng
                );

            return distance <= km;

        });

    drawMarkers(filtered);

}
function drawMarkers(points){

    allMarkers.forEach(m=>m.setMap(null));
    allMarkers = [];

    points.forEach(point=>{

        const marker = new naver.maps.Marker({

    position: new naver.maps.LatLng(
        point.lat,
        point.lng
    ),

    map: map,

    icon: {

        url: './marker-red.png',

        size: new naver.maps.Size(42, 42),

        scaledSize: new naver.maps.Size(42, 42),

        anchor: new naver.maps.Point(21, 42)

    }

});
        const infoWindow = new naver.maps.InfoWindow({
            content:`
            <div style="padding:10px;min-width:180px;">
                <b>${point.name}</b><br>
                지역 : ${point.region}<br>
                주소 : ${point.address}<br>
                유형 : ${point.type}<br>
                채비 : ${point.rig}
            </div>`
        });

        naver.maps.Event.addListener(marker, 'click', function () {

    if (infoWindow.getMap()) {
        infoWindow.close();
    } else {
        infoWindow.open(map, marker);
    }

        });

        allMarkers.push(marker);

    });

}

function showAll(){

    drawMarkers(pointData);

}

function filterType(type){

    const filtered = pointData.filter(
        p=>p.type===type
    );

    drawMarkers(filtered);

}


</script>

</body>
</html>
